<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>semantle-helper</title>
    <link rel="stylesheet" href="/style.css"/>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
</head>
<body>
<main class="page">
    <section class="card">
        <header class="header">
            <h1>semantle-helper</h1>
            <p>Check common Hebrew words and find the ones whose similarity is inside your selected range.</p>
        </header>

        <form id="checker-form" class="form">
            <div class="grid">
                <label>
                    <span>Words to check</span>
                    <input type="number" id="wordsNum" name="wordsNum" min="1" max="10000" required/>
                    <small id="wordsNum-help"></small>
                </label>

                <label>
                    <span>Minimum similarity</span>
                    <input type="number" id="simMinLimit" name="simMinLimit" min="1" max="99" required/>
                    <small id="simMinLimit-help"></small>
                </label>

                <label>
                    <span>Maximum similarity</span>
                    <input type="number" id="simMaxLimit" name="simMaxLimit" min="2" max="100" required/>
                    <small id="simMaxLimit-help"></small>
                </label>
            </div>

            <div class="actions">
                <button type="submit" id="submit-btn" class="primary-btn">Check words</button>
                <button type="button" id="abort-btn" class="error" disabled>Abort</button>
                <button type="button" id="reset-btn" class="secondary">Reset</button>
            </div>
        </form>

        <section class="status-wrap">
            <div id="status" class="status">Ready.</div>
            <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </section>

        <section id="results" class="results hidden">
            <div class="results-header">
                <h2>Results</h2>
                <button type="button" id="export-btn" class="link-button">Export</button>
            </div>
            <div id="result-table-wrap"></div>
        </section>
    </section>
</main>

<script src="/script.js"></script>
</body>
</html>
